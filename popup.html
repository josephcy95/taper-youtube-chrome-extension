<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Taper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Taper</h1>
          <p id="statusLine">0 Shorts • 00:00</p>
        </div>
        <button id="edit" type="button">Edit</button>
      </header>

      <section class="panel">
        <div class="section-head">
          <h2>Picture in Picture</h2>
        </div>

        <label class="row checkbox-row">
          <span>Enable PiP</span>
          <input id="pipEnabled" type="checkbox">
        </label>
      </section>

      <details class="panel collapsible">
        <summary class="section-head">
          <h2>YouTube Shorts</h2>
          <span class="summary-icon" aria-hidden="true"></span>
        </summary>

        <label class="row">
          <span>Condition</span>
          <select id="mode">
            <option value="count">Count</option>
            <option value="time">Time</option>
            <option value="both">Both</option>
            <option value="either">Either</option>
          </select>
        </label>

        <label class="row">
          <span>Shorts Count Limit</span>
          <input id="countLimit" type="number" min="1" max="9999" step="1">
        </label>

        <label class="row">
          <span>Shorts Time Limit</span>
          <input id="timeLimitMinutes" type="number" min="1" max="1440" step="1">
        </label>

        <label class="row">
          <span>Block Every Shorts</span>
          <input id="hintEveryCount" type="number" min="0" max="9999" step="1">
        </label>

        <label class="row">
          <span>Block Every Minutes</span>
          <input id="hintEveryMinutes" type="number" min="0" max="1440" step="1">
        </label>

        <label class="row">
          <span>Block Seconds</span>
          <input id="hintDurationSeconds" type="number" min="1" max="60" step="1">
        </label>

        <label class="row">
          <span>Loop Check Plays</span>
          <input id="loopPromptLimit" type="number" min="1" max="100" step="1">
        </label>
      </details>

      <footer>
        <button id="pause" type="button">Pause 5m</button>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
